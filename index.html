  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

6;\n    --ink-3:#7c7e85;\n    --teal:#2563eb;\n    --teal-deep:#1d4ed8;\n    --amber:#b45309;\n    --rose:#b91c1c;\n    --ok:#4d7c0f;\n    --shadow: 0 1px 0 rgba(0,0,0,.02) inset;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}\n  a{color:inherit;text-decoration:none}\n  button{font-family:inherit}\n  .mono{font-family:\"JetBrains Mono\",ui-monospace,Menlo,monospace;font-feature-settings:\"ss01\",\"zero\"}\n  .serif{font-family:\"Instrument Serif\",ui-serif,Georgia,serif;font-style:italic;font-weight:400}\n  ::selection{background:var(--teal);color:#0a0b0d}\n\n  /* backdrop grid */\n  body::before{\n    content:\"\";position:fixed;inset:0;pointer-events:none;z-index:0;\n    background-image:\n      linear-gradient(to right, color-mix(in oklab, var(--line) 60%, transparent) 1px, transparent 1px),\n      linear-gradient(to bottom, color-mix(in oklab, var(--line) 60%, transparent) 1px, transparent 1px);\n    background-size: 80px 80px;\n    mask-image: radial-gradient(ellipse at 50% 30%, black 10%, transparent 75%);\n    opacity:.5;\n  }\n\n  .wrap{max-width:1360px;margin:0 auto;padding:0 32px;position:relative;z-index:1}\n\n  /* nav */\n  nav.top{\n    position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);\n    background:color-mix(in oklab, var(--bg) 72%, transparent);\n    border-bottom:1px solid var(--line);\n  }\n  .nav-row{display:flex;align-items:center;gap:28px;height:60px}\n  .brand{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:-.01em}\n  .brand-mark-svg{display:block;border-radius:5px;flex-shrink:0}\n  .brand-mark{width:22px;height:22px;position:relative;display:inline-block}\n  .brand-mark::before,.brand-mark::after{content:\"\";position:absolute;inset:0;border:1.5px solid var(--ink);border-radius:50%}\n  .brand-mark::after{transform:rotate(45deg) scal 600;line-height:.98;margin:0 0 28px;max-width:18ch}\n  .closer h2 em{font-family:\"Instrument Serif\";font-style:italic;font-weight:400;color:var(--teal)}\n  .closer .row{display:flex;gap:12px;flex-wrap:wrap}\n\n  /* Tweaks panel */\n  .tweaks{\n    position:fixed;right:18px;bottom:18px;z-index:90;\n    background:var(--panel);border:1px solid var(--line-2);border-radius:6px;\n    padding:14px 16px;display:none;flex-direction:column;gap:10px;width:260px;\n    box-shadow:0 20px 60px -20px rgba(0,0,0,.5);font-size:13px;\n  }\n  .tweaks.on{display:flex}\n  .tweaks h6{font-family:\"JetBrains Mono\",monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);margin:0 0 2px;font-weight:500}\n  .tweak-row{display:flex;align-items:center;justify-content:space-between;gap:10px}\n  .tweak-row label{color:var(--ink-2);font-size:12.5px}\n  .swatches{display:flex;gap:6px}\n  .sw{width:22px;height:22px;border-radius:3px;border:1px solid var(--line-2);cursor:pointer;position:relative}\n  .sw.sel::after{content:\"\";position:absolute;inset:-3px;border:1.5px solid var(--ink);border-radius:5px}\n  .tweak-row select{background:var(--panel-2);color:var(--ink);border:1px solid var(--line-2);border-radius:3px;padding:4px 6px;font-family:inherit;font-size:12px}\n\n  @media (max-width: 980px){\n    .wrap{padding:0 22px}\n    .hero-grid{grid-template-columns:1fr;gap:40px}\n    .loop-stage{max-width:440px;margin:0 auto}\n    .hero-meta{grid-template-columns:repeat(2,1fr)}\n    .hero-meta > div{border-right:none;border-bottom:1px solid var(--line)}\n    .sec-head{grid-template-columns:1fr;gap:16px}\n    .sec-kicker{position:static;flex-direction:row;align-items:center;gap:18px}\n    .sec-kicker .n{font-size:56px}\n    .sec-kicker .topic{padding-top:0;border-top:none;border-left:1px solid var(--line);padding-left:14px;align-self:stretch;display:flex;align-items:center}\n    .sec-kicker .topic::before{display:none}\n    .compare{grid-template-columns:1fr}\n    .en ggle\" id=\"themeBtn\" aria-label=\"Toggle theme\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n      <a class=\"btn btn-ghost\" href=\"https://fastaiagent.net/demo\">Book demo<\u002Fa>\n      <a class=\"btn btn-primary\" href=\"https://app.fastaiagent.net/\">Start free →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- HERO -->\n<section class=\"hero\">\n  <div class=\"wrap hero-grid\">\n    <div>\n      <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan> SDK v1.0.0 · MCP · Swarms · Local UI — just shipped<\u002Fspan>\n      <h1 class=\"display\">\n        Build, Deploy<br>\n        &amp; Govern <span class=\"accent\">AI&nbsp;Agents<\u002Fspan><br>\n        <span class=\"under\">in one closed loop.<\u002Fspan>\n      <\u002Fh1>\n      <p class=\"lede\">\n        Every tool gives you pieces — FastAIAgent closes the loop. Develop → Trace → Feedback → Eval → Optimize → Deploy, in a single system. From failing trace to fixed agent in <b style=\"color:var(--ink)\">10 minutes<\u002Fb>, not 4 hours.\n      <\u002Fp>\n      <div class=\"hero-cta\">\n        <a href=\"https://app.fastaiagent.net/\" class=\"btn btn-primary\">Start free\n          <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n        <a href=\"https://fastaiagent.net/demo\" class=\"btn\">Book a demo<\u002Fa>\n        <button class=\"pip mono\" id=\"copyCmd\" title=\"Click to copy\">pip install fastaiagent<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div class=\"hero-meta mono\">\n        <div><div class=\"k\">Models<\u002Fdiv><div class=\"v\">Multi-LLM<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"k\">Connectors<\u002Fdiv><div class=\"v\">29+<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"k\">Protocol<\u002Fdiv><div class=\"v\">MCP Native<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"k\">License<\u002Fdiv><div class=\"v\">Apache 2.0<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"k\">Deploy<\u002Fdiv><div class=\"v\">SaaS · Self-host<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Loop diagram -->\n    <div class=\"loop-stage\" id=\"loopStage\">\n      <svg viewBox=\"-260 -260 520 520\" aria-hidden=\"true\">\n        <defs>\n          <marker id=\"arr\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto-start-reverse\">\n            <path d=\"M0 0 L10 5 L0 10 z\" fill=\"currentColor\"><\u002Fpath>\n          <\u002Fmarker>\n        <\u002Fdefs>\n        <g stroke=\"currentColor\" stroke-width=\"1\" fill=\"none\" style=\"color:var(--line)\">\n          <circle cx=\"0\" cy=\"0\" r=\"200\" stroke-dasharray=\"2 5\" opacity=\".7\"><\u002Fcircle>\n          <circle cx=\"0\" cy=\"0\" r=\"140\" opacity=\".4\"><\u002Fcircle>\n          <circle cx=\"0\" cy=\"0\" r=\"80\" opacity=\".3\"><\u002Fcircle>\n        <\u002Fg>\n        <g stroke=\"currentColor\" stroke-width=\"1.4\" fill=\"none\" style=\"color:var(--teal)\" stroke-dasharray=\"3 4\">\n          <circle cx=\"0\" cy=\"0\" r=\"200\" pathLength=\"360\" stroke-dashoffset=\"0\" id=\"loopPath\">\n            <animate attributeName=\"stroke-dashoffset\" from=\"0\" to=\"-360\" dur=\"40s\" repeatCount=\"indefinite\"><\u002Fanimate>\n          <\u002Fcircle>\n        <\u002Fg>\n      <\u002Fsvg>\n      <!-- Nodes positioned at angles on r=200 -->\n      <div class=\"loop-node\" data-step=\"1\" style=\"left:calc(50% + 200px * 0);top:calc(50% + 200px * -1)\"><span class=\"idx\">01<\u002Fspan> Develop<\u002Fdiv>\n      <div class=\"loop-node\" data-step=\"2\" style=\"left:calc(50% + 200px * 0.782);top:calc(50% + 200px * -0.623)\"><span class=\"idx\">02<\u002Fspan> Trace<\u002Fdiv>\n      <div class=\"loop-node\" data-step=\"3\" style=\"left:calc(50% + 200px * 0.975);top:calc(50% + 200px * 0.223)\"><span class=\"idx\">03<\u002Fspan> Feedback<\u002Fdiv>\n      <div class=\"loop-node\" data-step=\"4\" style=\"left:calc(50% + 200px * 0.434);top:calc(50% + 200px * 0.901)\"><span class=\"idx\">04<\u002Fspan> Eval<\u002Fdiv>\n      <div class=\"loop-node\" data-step=\"5\" style=\"left:calc(50% + 200px * -0.434);top:calc(50% + 200px * 0.901)\"><span class=\"idx\">05<\u002Fspan> Optimize<\u002Fdiv>\n      <div class=\"loop-node\" data-step=\"6\" style=\"left:calc(50% + 200px * -0.975);top:calc(50% + 200px * 0.223)\"><span class=\"idx\">06<\u002Fspan> Compare<\u002Fdiv>\n      <div class=\"loop-node\" data-step=\"7\" style=\"left:calc(50% + 200px * -0.782);top:calc(50% + 200px * -0.623)\"><span class=\"idx\">07<\u002Fspan> Deploy<\u002Fdiv>\n      <div class=\"loop-center\">\n        <div class=\"big\">the loop<\u002Fdiv>\n        <div class=\"sub mono\">7 steps · 1 data plane<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- LOOP / COMPARE -->\n<section id=\"loop\">\n  <div class=\"wrap sec-head\">\n    <div class=\"sec-kicker\"><span class=\"n\">01<\u002Fspan><span class=\"topic\">The Operational Loop<\u002Fspan><\u002Fdiv>\n    <div>\n      <h2 class=\"sec-title\">One system. Seven steps. <span class=\"serif\" style=\"color:var(--teal)\">Zero context switching.<\u002Fspan><\u002Fh2>\n      <p class=\"sec-sub\">Most teams stitch together 3–4 tools to go from a failing agent to a fixed one. FastAIAgent is the only platform where trace, feedback, eval, optimization, comparison, and deployment happen in a single closed loop — so every production failure becomes a shipped improvement, not a fire drill.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"wrap\">\n    <div class=\"compare\">\n      <div class=\"compare-col\">\n        <span class=\"c-tag bad\">Without FastAIAgent<\u002Fspan>\n        <div class=\"c-title\">4 Hours Per Failure <span class=\"time mono\">~4h 00m<\u002Fspan><\u002Fdiv>\n        <div class=\"c-desc\">Every production failure is a multi-hour context-switching fire drill across 3–4 different tools.<\u002Fdiv>\n        <ul class=\"c-steps bad mono\">\n          <li><span class=\"mark\">✗<\u002Fspan> Failing trace surfaces in observability tool<\u002Fli>\n          <li><span class=\"mark\">✗<\u002Fspan> Copy-paste into notebook, hand-write test case<\u002Fli>\n          <li><span class=\"mark\">✗<\u002Fspan> Switch to prompt tool, rewrite by intuition<\u002Fli>\n          <li><span class=\"mark\">✗<\u002Fspan> Manually run eval. Open spreadsheet. Compare.<\u002Fli>\n          <li><span class=\"mark\">✗<\u002Fspan> Deploy. Pray. Repeat next week.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"compare-col good\">\n        <span class=\"c-tag good\">With FastAIAgent<\u002Fspan>\n        <div class=\"c-title\">10 Minutes Per Failure <span class=\"time mono\">~0h 10m<\u002Fspan><\u002Fdiv>\n        <div class=\"c-desc\">One system. Thumbs-down is the first click; deploy is the last. No context switch between them.<\u002Fdiv>\n        <ul class=\"c-steps good mono\">\n          <li><span class=\"mark\">→<\u002Fspan> Failing trace, click 👎 — eval case auto-created<\u002Fli>\n          <li><span class=\"mark\">→<\u002Fspan> Prompt Optimizer rewrites with context from the trace<\u002Fli>\n          <li><span class=\"mark\">→<\u002Fspan> Compare Mode A/B tests old vs. new on real cases<\u002Fli>\n          <li><span class=\"mark\">→<\u002Fspan> Ship the winner. SDK pulls the new version.<\u002Fli>\n          <li><span class=\"mark\">✓<\u002Fspan> Production-fixed. Eval suite permanently stronger.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ENTRY POINTS -->\n<section>\n  <div class=\"wrap sec-head\">\n    <div class=\"sec-kicker\"><span class=\"n\">02<\u002Fspan><span class=\"topic\">Two Entry Points<\u002Fspan><\u002Fdiv>\n    <div>\n      <h2 class=\"sec-title\">Built for engineers. <span class=\"serif\" style=\"color:var(--teal)\">Designed for teams.<\u002Fspan><\u002Fh2>\n      <p class=\"sec-sub\">Whether you write Python or build in a UI, you get the same trace dashboard, the same prompt registry, the same eval framework. One data plane, two front doors.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"wrap\">\n    <div class=\"entries\">\n      <div class=\"entry\">\n        <div class=\"who\">⌨ For Engineers<\u002Fdiv>\n        <h3>Open-Source SDK<\u002Fh3>\n        <div class=\"desc\">Build agents in Python. Run locally. Connect to the platform for observability, prompt management, and eval — when you're ready.<\u002Fdiv>\n        <ul>\n          <li>Multi-provider LLM (OpenAI, Anthropic, Ollama, Azure, Bedrock)<\u002Fli>\n          <li>Structured output, streaming, tool calling<\u002Fli>\n          <li>Supervisor-Worker multi-agent teams<\u002Fli>\n          <li>Chain orchestration with cycles, checkpoints, HITL<\u002Fli>\n          <li>Eval framework with 7+ scorers and LLM judge<\u002Fli>\n          <li>Local KB (ingestion, chunking, embedding, search)<\u002Fli>\n          <li><span class=\"mono\">fa.connect()<\u002Fspan> for platform services<\u002Fli>\n        <\u002Ful>\n        <button class=\"pip mono\" onclick=\"copyPip(this)\">pip install fastaiagent<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"entry\">\n        <div class=\"who\">🖥 For Teams<\u002Fdiv>\n        <h3>Full Platform<\u002Fh3>\n        <div class=\"desc\">Build agents in the UI. Visual chain editor. Configure connectors. Test in the Playground. Monitor in the dashboard. No SDK required.<\u002Fdiv>\n        <ul>\n          <li>Visual Workflow Editor with drag-and-drop canvas<\u002Fli>\n          <li>29+ pre-built connectors and hosted MCP servers<\u002Fli>\n          <li>Advanced RAG with hybrid search and reranking<\u002Fli>\n          <li>Prompt Registry with auto-optimization<\u002Fli>\n          <li>Agent Replay with fork-and-rerun debugging<\u002Fli>\n          <li>RBAC, SSO, audit trails, SaaS billing<\u002Fli>\n          <li>Air-gapped deployment for regulated environments<\u002Fli>\n        <\u002Ful>\n        <a href=\"https://app.fastaiagent.net/\" class=\"btn btn-primary\">Start free →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SDK -->\n<section id=\"sdk\">\n  <div class=\"wrap sec-head\">\n    <div class=\"sec-kicker\"><span class=\"n\">03<\u002Fspan><span class=\"topic\">Open-Source SDK<\u002Fspan><\u002Fdiv>\n    <div>\n      <h2 class=\"sec-title\">Five lines to your <span class=\"serif\" style=\"color:var(--teal)\">first agent.<\u002Fspan><\u002Fh2>\n      <p class=\"sec-sub\">The <span class=\"mono\">fastaiagent<\u002Fspan> SDK is open-source (Apache 2.0) and runs anywhere Python runs. Start standalone — add the platform later with a single <span class=\"mono\">fa.connect()<\u002Fspan> call.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"wrap\">\n    <div class=\"sdk-grid\">\n      <ul class=\"sdk-list\">\n        <li><span class=\"check\">✓<\u002Fspan><span><b>Multi-Provider LLM<\u002Fb> — OpenAI, Anthropic, Ollama, Azure, Bedrock, and custom endpoints<\u002Fspan><\u002Fli>\n        <li><span class=\"check\">✓<\u002Fspan><span><b>Streaming + Structured Output<\u002Fb> — SSE parsing across providers with <span class=\"mono\">response_format<\u002Fspan><\u002Fspan><\u002Fli>\n        <li><span class=\"check\">✓<\u002Fspan><span><b>Context / DI<\u002Fb> — <span class=\"mono\">RunContext[T]<\u002Fspan> passes DB connections, API clients, and state to tools<\u002Fspan><\u002Fli>\n        <li><span class=\"check\">✓<\u002Fspan><span><b>Guardrails<\u002Fb> — 5 types, 5 built-ins. Input, output, tool-call, and tool-result positions<\u002Fspan><\u002Fli>\n        <li><span class=\"check\">✓<\u002Fspan><span><b>fa.connect()<\u002Fb> — Traces flow up, prompts flow down, evals flow both ways. Platform is optional.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n\n      <div class=\"code\">\n        <div class=\"code-head\">\n          <span class=\"dots\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan>\n          <span class=\"file\">quickstart.py<\u002Fspan>\n          <span class=\"tag\">apache 2.0 · pypi: fastaiagent<\u002Fspan>\n        <\u002Fdiv>\n<pre><span class=\"tk-k\">import<\u002Fspan> <span class=\"tk-n\">fastaiagent<\u002Fspan> <span class=\"tk-k\">as<\u002Fspan> <span class=\"tk-n\">fa<\u002Fspan>\n\n<span class=\"tk-c\"># Connect to platform (optional)<\u002Fspan>\n<span class=\"tk-n\">fa<\u002Fspan>.<span class=\"tk-f\">connect<\u002Fspan>(api_key=<span class=\"tk-s\">\"fa_k_...\"<\u002Fspan>, project=<span class=\"tk-s\">\"my-project\"<\u002Fspan>)\n\n<span class=\"tk-c\"># Define your agent<\u002Fspan>\n<span class=\"tk-n\">agent<\u002Fspan> = <span class=\"tk-n\">fa<\u002Fspan>.<span class=\"tk-f\">Agent<\u002Fspan>(\n    name=<span class=\"tk-s\">\"support-bot\"<\u002Fspan>,\n    model=<span class=\"tk-s\">\"gpt-4o\"<\u002Fspan>,\n    system_prompt=<span class=\"tk-s\">\"You are a helpful support agent.\"<\u002Fspan>,\n    tools=[<span class=\"tk-n\">search_kb<\u002Fspan>, <span class=\"tk-n\">create_ticket<\u002Fspan>],\n    guardrails=[<span class=\"tk-n\">pii_filter<\u002Fspan>, <span class=\"tk-n\">toxicity_check<\u002Fspan>],\n)\n\n<span class=\"tk-c\"># Run it — traces auto-export, prompts pull from registry<\u002Fspan>\n<span class=\"tk-n\">result<\u002Fspan> = <span class=\"tk-k\">await<\u002Fspan> <span class=\"tk-n\">agent<\u002Fspan>.<span class=\"tk-f\">run<\u002Fspan>(<span class=\"tk-s\">\"I can't log in to my account\"<\u002Fspan>)<\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- SDK feature grid -->\n    <div class=\"sdk-grid2\">\n      <div class=\"sdk-tile\"><span class=\"badge\">SDK<\u002Fspan><span class=\"ico\">⇄<\u002Fspan><h4>Supervisor-Worker<\u002Fh4><p>Multi-agent orchestration with context passthrough, streaming delegation, and callable dynamic prompts.<\u002Fp><\u002Fdiv>\n      <div class=\"sdk-tile\"><span class=\"badge\">SDK<\u002Fspan><span class=\"ico\">⇆<\u002Fspan><h4>Peer-to-peer Swarms<\u002Fh4><p>Beyond Supervisor/Worker — agents hand off directly. The active agent decides when to transfer control.<\u002Fp><\u002Fdiv>\n      <div class=\"sdk-tile\"><span class=\"badge\">SDK<\u002Fspan><span class=\"ico\">⛓<\u002Fspan><h4>Chain Orchestration<\u002Fh4><p>Cyclic graphs, typed state, parallel execution, conditional routing — in code.<\u002Fp><\u002Fdiv>\n      <div class=\"sdk-tile\"><span class=\"badge\">SDK<\u002Fspan><span class=\"ico\">⏸<\u002Fspan><h4>Durable HITL<\u002Fh4><p><span class=\"mono\">interrupt()<\u002Fspan> pauses any workflow for human approval. Resume from any process — hours, days, or a server restart later.<\u002Fp><\u002Fdiv>\n      <div class=\"sdk-tile\"><span class=\"badge\">SDK<\u002Fspan><span class=\"ico\">⊘<\u002Fspan><h4>Idempotent Side Effects<\u002Fh4><p><span class=\"mono\">@idempotent<\u002Fspan> caches a function's result per execution. Replays on resume return the cached value instead of re-charging cards or double-sending emails.<\u002Fp><\u002Fdiv>\n      <div class=\"sdk-tile\"><span class=\"badge\">SDK<\u002Fspan><span class=\"ico\">⛁<\u002Fspan><h4>SQLite + Postgres Durability<\u002Fh4><p><span class=\"mono\">SQLiteCheckpointer<\u002Fspan> locally, <span class=\"mono\">PostgresCheckpointer<\u002Fspan> in production — same Checkpointer protocol, atomic resume claim via <span class=\"mono\">DELETE … RETURNING<\u002Fspan>.<\u002Fp><\u002Fdiv>\n      <div class=\"sdk-tile\"><span class=\"badge\">SDK<\u002Fspan><span class=\"ico\">✓<\u002Fspan><h4>Approvals UI<\u002Fh4><p><span class=\"mono\">/approvals<\u002Fspan> page lists every paused workflow. Click to inspect the frozen context, click Approve or Reject. Maps to 409 Conflict on double-click.<\u002Fp><\u002Fdiv>\n      <div class=\"sdk-tile\"><span class=\"badge\">SDK<\u002Fspan><span class=\"ico\">↻<\u002Fspan><h4>Agent Replay<\u002Fh4><p>Fork any execution at any step, re-run with modified inputs. The feature no other framework has.<\u002Fp><\u002Fdiv>\n      <div class=\"sdk-tile\"><span class=\"badge\">SDK<\u002Fspan><span class=\"ico\">⊹<\u002Fspan><h4>OTel Tracing<\u002Fh4><p>OpenTelemetry spans with BatchSpanProcessor. Local SQLite or export to platform.<\u002Fp><\u002Fdiv>\n      <div class=\"sdk-tile\"><span class=\"badge\">SDK<\u002Fspan><span class=\"ico\">∆<\u002Fspan><h4>Eval Framework<\u002Fh4><p>7+ scorers, LLM-as-Judge, trajectory &amp; session eval. Publish to platform in one call.<\u002Fp><\u002Fdiv>\n      <div class=\"sdk-tile\"><span class=\"badge\">SDK<\u002Fspan><span class=\"ico\">◈<\u002Fspan><h4>5 Guardrail Types<\u002Fh4><p>Input, output, tool-call, tool-result, content. 5 built-in guards plus custom definitions.<\u002Fp><\u002Fdiv>\n      <div class=\"sdk-tile\"><span class=\"badge\">SDK<\u002Fspan><span class=\"ico\">≡<\u002Fspan><h4>Local Knowledge Base<\u002Fh4><p>Ingestion, multi-strategy chunking, embedding, vector search — fully local, no platform needed.<\u002Fp><\u002Fdiv>\n      <div class=\"sdk-tile\"><span class=\"badge\">SDK<\u002Fspan><span class=\"ico\">⌗<\u002Fspan><h4>Pluggable KB backends<\u002Fh4><p>FAISS + BM25 + SQLite by default. Swap to <span class=\"mono\">Qdrant<\u002Fspan> or <span class=\"mono\">Chroma<\u002Fspan> with one kwarg.<\u002Fp><\u002Fdiv>\n      <div class=\"sdk-tile\"><span class=\"badge\">SDK<\u002Fspan><span class=\"ico\">⌘<\u002Fspan><h4>Prompt Registry<\u002Fh4><p>Version, compose with fragments, pull from platform with <span class=\"mono\">PromptRegistry(source=…)<\u002Fspan>.<\u002Fp><\u002Fdiv>\n      <div class=\"sdk-tile\"><span class=\"badge\">SDK<\u002Fspan><span class=\"ico\">◎<\u002Fspan><h4>Composable Memory<\u002Fh4><p>Stack <span class=\"mono\">StaticBlock<\u002Fspan>, <span class=\"mono\">SummaryBlock<\u002Fspan>, <span class=\"mono\">VectorBlock<\u002Fspan>, <span class=\"mono\">FactExtractionBlock<\u002Fspan>. Custom via subclass.<\u002Fp><\u002Fdiv>\n      <div class=\"sdk-tile\"><span class=\"badge\">SDK<\u002Fspan><span class=\"ico\">∥<\u002Fspan><h4>Middleware<\u002Fh4><p>Compose <span class=\"mono\">before_model<\u002Fspan>, <span class=\"mono\">after_model<\u002Fspan>, <span class=\"mono\">wrap_tool<\u002Fspan>. <span class=\"mono\">TrimLongMessages<\u002Fspan>, <span class=\"mono\">RedactPII<\u002Fspan>, <span class=\"mono\">ToolBudget<\u002Fspan> built-in.<\u002Fp><\u002Fdiv>\n      <div class=\"sdk-tile\"><span class=\"badge\">SDK<\u002Fspan><span class=\"ico\">⌬<\u002Fspan><h4>Local UI<\u002Fh4><p><span class=\"mono\">fastaiagent ui<\u002Fspan> opens span trees, replay, evals, prompt editor, KB browser, <span class=\"mono\">/approvals<\u002Fspan>. SQLite, no Docker.<\u002Fp><\u002Fdiv>\n      <div class=\"sdk-tile\"><span class=\"badge\">SDK<\u002Fspan><span class=\"ico\">⌘<\u002Fspan><h4>Agents as MCP servers<\u002Fh4><p>One line — <span class=\"mono\">agent.as_mcp_server(transport=\"stdio\").run()<\u002Fspan> — drops into Claude Desktop, Cursor, Continue, Zed.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PLATFORM -->\n<section id=\"platform\">\n  <div class=\"wrap sec-head\">\n    <div class=\"sec-kicker\"><span class=\"n\">04<\u002Fspan><span class=\"topic\">Complete Agent OS<\u002Fspan><\u002Fdiv>\n    <div>\n      <h2 class=\"sec-title\">Everything to build, ship, <span class=\"serif\" style=\"color:var(--teal)\">and improve agents.<\u002Fspan><\u002Fh2>\n      <p class=\"sec-sub\">Everything SDK agents need to go to production — and everything teams need to manage them at scale. One platform. No tool-stitching. No context switching.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"wrap\">\n    <div class=\"plat-grid\">\n      <div class=\"plat-card only\">\n        <span class=\"only-tag\">Only in FastAIAgent<\u002Fspan>\n        <span class=\"glyph mono\">◎<\u002Fspan>\n        <h4>Closed-Loop Operations<\u002Fh4>\n        <p>Develop → Trace → Feedback → Eval → Optimize → Compare → Deploy, in one system. Negative feedback auto-creates eval cases. Prompt Optimizer rewrites. Compare Mode A/B tests.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"plat-card only\">\n        <span class=\"only-tag\">Only in FastAIAgent<\u002Fspan>\n        <span class=\"glyph mono\">↻<\u002Fspan>\n        <h4>Agent Replay<\u002Fh4>\n        <p>Step through any execution span-by-span. Fork from any point and re-run with modified inputs. Compare original vs. forked outcomes side by side.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"plat-card only\">\n        <span class=\"only-tag\">Only in FastAIAgent<\u002Fspan>\n        <span class=\"glyph mono\">=<\u002Fspan>\n        <h4>One Data Plane<\u002Fh4>\n        <p>Open-source SDK and full platform share the same trace dashboard, prompt registry, and eval framework. <span class=\"mono\">fa.connect()<\u002Fspan> bridges them with one call.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"plat-card\">\n        <span class=\"cat\">Platform<\u002Fspan><span class=\"glyph mono\">⟐<\u002Fspan>\n        <h4>Visual Workflow Editor<\u002Fh4>\n        <p>Drag-and-drop canvas with cyclic graphs, conditional routing, parallel execution, HITL nodes, and checkpointing — no orchestration code needed.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"plat-card\">\n        <span class=\"cat\">Platform<\u002Fspan><span class=\"glyph mono\">≡<\u002Fspan>\n        <h4>Advanced RAG Pipeline<\u002Fh4>\n        <p>Hybrid search, reranking, query rewriting, adaptive routing, self-grading, contextual enrichment — 20+ configurable retrieval flags.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"plat-card\">\n        <span class=\"cat\">Platform<\u002Fspan><span class=\"glyph mono\">⑂<\u002Fspan>\n        <h4>Prompt Registry &amp; Optimizer<\u002Fh4>\n        <p>Versioning, fragments, 3-mode auto-optimization, Compare Mode A/B testing, version analytics, approval workflows.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"plat-card\">\n        <span class=\"cat\">Platform<\u002Fspan><span class=\"glyph mono\">⌖<\u002Fspan>\n        <h4>Observability &amp; Tracing<\u002Fh4>\n        <p>Full hierarchical traces: LLM calls, tool invocations, tokens, latency, cost — linked to the exact prompt version used.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"plat-card\">\n        <span class=\"cat\">Platform<\u002Fspan><span class=\"glyph mono\">⚖<\u002Fspan>\n        <h4>Evaluation Intelligence<\u002Fh4>\n        <p>LLM-as-Judge scoring, RAG eval (Ragas), annotation queues, online eval policies, A/B comparisons, CI/CD eval API, MLflow.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"plat-card\">\n        <span class=\"cat\">Platform<\u002Fspan><span class=\"glyph mono\">⟡<\u002Fspan>\n        <h4>Agent Memory<\u002Fh4>\n        <p>Long-term memory across conversations with automatic extraction. Provider-agnostic. Configurable thresholds and vector-based recall.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"plat-card\">\n        <span class=\"cat\">Platform<\u002Fspan><span class=\"glyph mono\">✦<\u002Fspan>\n        <h4>Synthetic Data<\u002Fh4>\n        <p>LLM-powered test data from schemas. Preview with any connector, export to eval datasets. Bootstrap testing without manual collection.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"plat-card\">\n        <span class=\"cat\">Platform<\u002Fspan><span class=\"glyph mono\">◐<\u002Fspan>\n        <h4>Chat &amp; Sim<\u002Fh4>\n        <p>Streaming playground with tool call viz. Multi-turn sim with persona-driven users, session scorers, and trajectory analysis.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"plat-card\">\n        <span class=\"cat\">Platform<\u002Fspan><span class=\"glyph mono\">⌘<\u002Fspan>\n        <h4>29+ Connectors &amp; MCP<\u002Fh4>\n        <p>Databases, storage, messaging, CRM, email, data processing. First-class MCP support with hosted servers.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"plat-card\">\n        <span class=\"cat\">Platform<\u002Fspan><span class=\"glyph mono\">◑<\u002Fspan>\n        <h4>Human-in-the-Loop<\u002Fh4>\n        <p>Approval policies on tool calls. Chain pause for human input. Signed webhooks. Context-aware intelligent rejection.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"plat-card\">\n        <span class=\"cat\">Platform<\u002Fspan><span class=\"glyph mono\">⟿<\u002Fspan>\n        <h4>Public API<\u002Fh4>\n        <p>RESTful API at <span class=\"mono\">/public/v1/<\u002Fspan>. Scoped keys, rate limiting, SSE streaming, feedback, webhooks.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"plat-card\">\n        <span class=\"cat\">Enterprise<\u002Fspan><span class=\"glyph mono\">✶<\u002Fspan>\n        <h4>Enterprise Infrastructure<\u002Fh4>\n        <p>SSO + 4-role RBAC, air-gapped deployment, audit trails, encrypted secrets, EU AI Act compliance via FastAIShield.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- REPLAY -->\n<section id=\"replay\">\n  <div class=\"wrap sec-head\">\n    <div class=\"sec-kicker\"><span class=\"n\">05<\u002Fspan><span class=\"topic\">Agent Replay<\u002Fspan><\u002Fdiv>\n    <div>\n      <h2 class=\"sec-title\">Time-travel debugging <span class=\"serif\" style=\"color:var(--teal)\">for AI agents.<\u002Fspan><\u002Fh2>\n      <p class=\"sec-sub\">Step through any agent execution span-by-span. See exactly what the agent thought, which tools it called, what context it had — and fork from any point to explore \"what if?\" scenarios. Available in both the SDK and the platform.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"wrap\">\n    <div class=\"replay\" id=\"replayWidget\">\n      <div class=\"replay-head\">\n        <span class=\"title\">▶ Replay: Customer Support Agent<\u002Fspan>\n        <span class=\"spacer\"><\u002Fspan>\n        <span class=\"kv\"><span class=\"k\">steps<\u002Fspan>&nbsp;<b style=\"color:var(--ink)\">7<\u002Fb><\u002Fspan>\n        <span class=\"kv\"><span class=\"k\">tokens<\u002Fspan>&nbsp;<b style=\"color:var(--ink)\">1,847<\u002Fb><\u002Fspan>\n        <span class=\"kv\"><span class=\"k\">cost<\u002Fspan>&nbsp;<b style=\"color:var(--ink)\">$0.0062<\u002Fb><\u002Fspan>\n        <span class=\"kv\"><span class=\"k\">duration<\u002Fspan>&nbsp;<b style=\"color:var(--ink)\">2.4s<\u002Fb><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"replay-body\">\n        <div class=\"trace\" id=\"traceList\">\n          <!-- rows injected -->\n        <\u002Fdiv>\n        <div class=\"replay-detail\">\n          <div class=\"rd-title\">\n            <span class=\"num\" id=\"rdStep\">Step 4 · of 7<\u002Fspan>\n            <h4 id=\"rdTitle\">get_customer<\u002Fh4>\n            <span class=\"tool-tag\" id=\"rdTag\">TOOL<\u002Fspan>\n            <button class=\"fork-btn\"><span>⑂<\u002Fspan> Fork from here<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"io-grid\">\n            <div class=\"io-box\">\n              <div class=\"lab\">Input<\u002Fdiv>\n<pre id=\"rdIn\">{\n  \"tool_name\": \"salesforce.get_account\",\n  \"arguments\": {\n    \"account_name\": \"Acme Corp\"\n  }\n}<\u002Fpre>\n            <\u002Fdiv>\n            <div class=\"io-box\">\n              <div class=\"lab\">Output<\u002Fdiv>\n<pre id=\"rdOut\">{\n  \"id\": \"001Dn00000X8kPQ\",\n  \"name\": \"Acme Corp\",\n  \"employees\": 520,\n  \"annual_revenue\": 48000000\n}<\u002Fpre>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"replay-foot\">\n        <div class=\"meter\">\n          <div class=\"lab\">Tokens<\u002Fdiv>\n          <div class=\"val\"><b id=\"tokNow\">1,073<\u002Fb> / 1,847<\u002Fdiv>\n          <div class=\"bar\"><i id=\"tokBar\" style=\"width:58%\"><\u002Fi><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"nav-foot\">\n          <button id=\"prevBtn\">◀ Prev<\u002Fbutton>\n          <span id=\"stepLabel\">Step 4 of 7 · ⑂ 1 fork<\u002Fspan>\n          <button id=\"nextBtn\">Next ▶<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"meter\" style=\"text-align:right\">\n          <div class=\"lab\">Cost<\u002Fdiv>\n          <div class=\"val\"><b id=\"costNow\">$0.0028<\u002Fb> / $0.0062<\u002Fdiv>\n          <div class=\"bar\"><i id=\"costBar\" style=\"width:45%\"><\u002Fi><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PRICING -->\n<section id=\"pricing\">\n  <div class=\"wrap sec-head\">\n    <div class=\"sec-kicker\"><span class=\"n\">06<\u002Fspan><span class=\"topic\">Pricing<\u002Fspan><\u002Fdiv>\n    <div>\n      <h2 class=\"sec-title\">Start free. <span class=\"serif\" style=\"color:var(--teal)\">Scale when ready.<\u002Fspan><\u002Fh2>\n      <p class=\"sec-sub\">The SDK is open-source and always free. The platform offers a generous free tier — upgrade when your agents need team features, higher limits, or enterprise compliance.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"wrap\">\n    <div class=\"price-grid\">\n      <div class=\"price-card\">\n        <div class=\"price-name mono\">Free<\u002Fdiv>\n        <div class=\"price-val\">$0 <small>/ forever<\u002Fsmall><\u002Fdiv>\n        <ul class=\"price-list\">\n          <li>5,000 spans / month<\u002Fli>\n          <li>5 agents, 5 chains<\u002Fli>\n          <li>10 prompts, 20 eval runs<\u002Fli>\n          <li>1 user, 1 project<\u002Fli>\n          <li>Community support<\u002Fli>\n          <li>Full SDK — unlimited<\u002Fli>\n        <\u002Ful>\n        <a href=\"https://app.fastaiagent.net/\" class=\"btn\">Start free →<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"price-card hi\">\n        <div class=\"price-name mono\">Pro<\u002Fdiv>\n        <div class=\"price-val\">$199<small>/ mo<\u002Fsmall><\u002Fdiv>\n        <ul class=\"price-list\">\n          <li>50,000 spans / month<\u00 · updated <span id=\"stamp\">today<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- TWEAKS -->\n<div class=\"tweaks\" id=\"tweaks\">\n  <h6>Tweaks<\u002Fh6>\n  <div class=\"tweak-row\">\n    <label>Accent<\u002Flabel>\n    <div class=\"swatches\" id=\"swatches\">\n      <button class=\"sw\" data-accent=\"teal\" style=\"background:#14b8a6\" title=\"Teal\"><\u002Fbutton>\n      <button class=\"sw sel\" data-accent=\"blue\" style=\"background:#3b82f6\" title=\"Brand Blue (default)\"><\u002Fbutton>\n      <button class=\"sw\" data-accent=\"indigo\" style=\"background:#6366f1\" title=\"Indigo\"><\u002Fbutton>\n      <button class=\"sw\" data-accent=\"violet\" style=\"background:#8b5cf6\"><\u002Fbutton>\n      <button class=\"sw\" data-accent=\"amber\" style=\"background:#f59e0b\"><\u002Fbutton>\n      <button class=\"sw\" data-accent=\"rose\" style=\"background:#f43f5e\"><\u002Fbutton>\n      <button class=\"sw\" data-accent=\"lime\" style=\"background:#84cc16\"><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <label>Theme<\u002Flabel>\n    <select id=\"tweakTheme\">\n      <option value=\"dark\">Dark<\u002Foption>\n      <option value=\"light\">Light<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <label>Loop spin<\u002Flabel>\n    <select id=\"tweakSpin\">\n      <option value=\"on\">On<\u002Foption>\n      <option value=\"off\">Off<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <label>Grid backdrop<\u002Flabel>\n    <select id=\"tweakGrid\">\n      <option value=\"on\">On<\u002Foption>\n      <option value=\"off\">Off<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // ---- TWEAK DEFAULTS (edit mode persistable) ----\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"accent\": \"blue\",\n    \"theme\": \"dark\",\n    \"loopSpin\": \"on\",\n    \"gridBackdrop\": \"on\"\n  }/*EDITMODE-END*/;\n\n  const STORE_KEY = \"faa_tweaks\";\n  function loadTweaks(){\n    try{ return Object.assign({}, TWEAK_DEFAULTS, JSON.parse(localStorage.getItem(STORE_KEY)||\"{}\")); }\n    catch(e){ return {...TWEAK_DEFAULTS}; }\n  }\n  function saveTweaks(t){ localStorage.setItem(STORE_KEY, JSON.stringify(t)); }\n  const state = loadTweaks();\n\n  // ---- THEME ----\n  function applyTheme(t){\n    document.documentElement.dataset.theme = t;\n    const btn = document.getElementById(\"themeBtn\");\n    btn.innerHTML = t === \"light\"\n      ? '<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"4\"/><path d=\"M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41\"/><\u002Fsvg>'\n      : '<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z\"/><\u002Fsvg>';\n    document.getElementById(\"tweakTheme\").value = t;\n  }\n  document.getElementById(\"themeBtn\").addEventListener(\"click\", ()=>{\n    state.theme = state.theme === \"light\" ? \"dark\" : \"light\";\n    applyTheme(state.theme); saveTweaks(state);\n  });\n\n  // ---- ACCENT ----\n  const ACCENTS = {\n    teal:   { main:\"#5eead4\", deep:\"#14b8a6\", mainL:\"#0d9488\", deepL:\"#0f766e\" },\n    blue:   { main:\"#93c5fd\", deep:\"#3b82f6\", mainL:\"#2563eb\", deepL:\"#1d4ed8\" },\n    indigo: { main:\"#a5b4fc\", deep:\"#6366f1\", mainL:\"#4f46e5\", deepL:\"#4338ca\" },\n    violet: { main:\"#c4b5fd\", deep:\"#8b5cf6\", mainL:\"#7c3aed\", deepL:\"#6d28d9\" },\n    amber:  { main:\"#fcd34d\", deep:\"#f59e0b\", mainL:\"#b45309\", deepL:\"#92400e\" },\n    rose:   { main:\"#fda4af\", deep:\"#f43f5e\", mainL:\"#be123c\", deepL:\"#9f1239\" },\n    lime:   { main:\"#bef264\", deep:\"#84cc16\", mainL:\"#4d7c0f\", deepL:\"#3f6212\" },\n  };\n  function applyAccent(name){\n    const a = ACCENTS[name] || ACCENTS.teal;\n    const isLight = state.theme === \"light\";\n    document.documentElement.style.setProperty(\"--teal\", isLight ? a.mainL : a.main);\n    document.documentElement.style.setProperty(\"--teal-deep\", isLight ? a.deepL : a.deep);\n    document.querySelectorAll(\"#swatches .sw\").forEach(s=>{\n      s.classList.toggle(\"sel\", s.dataset.accent===name);\n    });\n  }\n  document.querySelectorAll(\"#swatches .sw\").forEach(s=>{\n    s.addEventListener(\"click\", ()=>{\n      state.accent = s.dataset.accent;\n      applyAccent(state.accent); saveTweaks(state);\n    });\n  });\n\n  // Re-apply accent on theme change\n  const _applyTheme = applyTheme;\n  applyTheme = function(t){ _applyTheme(t); applyAccent(state.accent); };\n\n  // ---- TWEAK SELECTS ----\n  document.getElementById(\"tweakTheme\").addEventListener(\"change\", e=>{\n    state.theme = e.target.value; applyTheme(state.theme); saveTweaks(state);\n  });\n  document.getElementById(\"tweakSpin\").addEventListener(\"change\", e=>{\n    state.loopSpin = e.target.value;\n    const anim = document.querySelector(\"#loopPath animate\");\n    if(anim) anim.setAttribute(\"dur\", state.loopSpin===\"on\" ? \"40s\" : \"0s\");\n    if(state.loopSpin===\"off\" && anim){ anim.setAttribute(\"dur\",\"999999s\"); }\n    saveTweaks(state);\n  });\n  document.getElementById(\"tweakGrid\").addEventListener(\"change\", e=>{\n    state.gridBackdrop = e.target.value;\n    document.body.style.setProperty(\"--_grid\", state.gridBackdrop===\"on\" ? \"1\" : \"0\");\n    document.body.classList.toggle(\"no-grid\", state.gridBackdrop===\"off\");\n    saveTweaks(state);\n  });\n  // inject grid-off rule\n  const gs = document.createElement(\"style\");\n  gs.textContent = \"body.no-grid::before{display:none}\";\n  document.head.appendChild(gs);\n\n  // Initial apply\n  applyTheme(state.theme);\n  applyAccent(state.accent);\n  if(state.gridBackdrop===\"off\"){ document.body.classList.add(\"no-grid\"); }\n  document.getElementById(\"tweakSpin\").value = state.loopSpin;\n  document.getElementById(\"tweakGrid\").value = state.gridBackdrop;\n\n  // ---- EDIT MODE (Tweaks toolbar integration) ----\n  window.addEventListener(\"message\", (e)=>{\n    if(!e.data || typeof e.data !== \"object\") return;\n    if(e.data.type === \"__activate_edit_mode\") document.getElementById(\"tweaks\").classList.add(\"on\");\n    if(e.data.type === \"__deactivate_edit_mode\") document.getElementById(\"tweaks\").classList.remove(\"on\");\n  });\n  try { window.parent.postMessage({type:\"__edit_mode_available\"}, \"*\"); } catch(e){}\n\n  // ---- Loop hover highlight ----\n  const nodes = document.querySelectorAll(\".loop-node\");\n  let active = 1;\n  function setActive(n){\n    active = n;\n    nodes.forEach(el=>el.classList.toggle(\"active\", +el.dataset.step===n));\n  }\n  setActive(1);\n  nodes.forEach(el=> el.addEventListener(\"mouseenter\", ()=> setActive(+el.dataset.step)));\n  // auto-cycle\n  setInterval(()=>{\n    if(state.loopSpin===\"off\") return;\n    setActive(active%7 + 1);\n  }, 1800);\n\n  // ---- Replay interactive ----\n  const STEPS = [\n    { name:\"System Prompt\",   tag:\"setup\",  tagCls:\"setup\",  ms:0,   tok:12,   cost:0.00002, in:'{\\n  \"role\": \"system\",\\n  \"content\": \"You are a helpful support agent.\\\\nUse tools. Be concise.\"\\n}', out:'(none — context injection)'},\n    { name:\"LLM Call #1\",     tag:\"LLM\",    tagCls:\"llm\",    ms:520, tok:412,  cost:0.00088, in:'{\\n  \"model\": \"gpt-4o\",\\n  \"messages\": [...],\\n  \"tools\": [\\\"search_kb\\\", \\\"get_customer\\\", \\\"create_ticket\\\"]\\n}', out:'{\\n  \"tool_calls\": [\\n    { \"name\": \"search_kb\", \"args\": {\"q\": \"login failure\"} }\\n  ]\\n}'},\n    { name:\"KB: Search Docs\", tag:\"KB\",     tagCls:\"kb\",     ms:85,  tok:0,    cost:0,       in:'{\\n  \"query\": \"login failure\",\\n  \"top_k\": 3\\n}', out:'[\\n  { \"id\":\"kb_217\", \"score\":0.91, \"title\":\"Password reset flow\" },\\n  { \"id\":\"kb_041\", \"score\":0.82, \"title\":\"MFA troubleshooting\" },\\n  { \"id\":\"kb_189\", \"score\":0.77, \"title\":\"Account lockout policy\" }\\n]'},\n    { name:\"get_customer\",    tag:\"TOOL\",   tagCls:\"tool\",   ms:180, tok:0,    cost:0,       in:'{\\n  \"tool_name\": \"salesforce.get_account\",\\n  \"arguments\": {\\n    \"account_name\": \"Acme Corp\"\\n  }\\n}', out:'{\\n  \"id\": \"001Dn00000X8kPQ\",\\n  \"name\": \"Acme Corp\",\\n  \"employees\": 520,\\n  \"annual_revenue\": 48000000\\n}'},\n    { name:\"Memory Retrieve\", tag:\"MEM\",    tagCls:\"mem\",    ms:42,  tok:0,    cost:0,       in:'{\\n  \"user_id\": \"u_8831\",\\n  \"top_k\": 2\\n}', out:'[\\n  { \"fact\":\"User prefers email over phone\", \"score\":0.88 },\\n  { \"fact\":\"Previously escalated a billing issue\", \"score\":0.74 }\\n]'},\n    { name:\"LLM Call #2\",     tag:\"LLM\",    tagCls:\"llm\",    ms:680, tok:891,  cost:0.00191, in:'{\\n  \"model\": \"gpt-4o\",\\n  \"messages\": [...with KB, customer, memory...]\\n}', out:'{\\n  \"content\": \"Hi! I pulled up your Acme Corp account...\",\\n  \"finish_reason\": \"stop\"\\n}'},\n    { name:\"Final Response\",  tag:\"OUT\",    tagCls:\"out\",    ms:0,   tok:544,  cost:0.00119, in:'(composed by LLM Call #2)', out:'\"Hi! I pulled up your Acme Corp account. Looks like MFA was\\\\nrecently enabled. I\\'ve sent a reset link to your work email. If\\\\nthat doesn\\'t work, I\\'ll escalate to a specialist.\"'},\n  ];\n  const traceList = document.getElementById(\"traceList\");\n  STEPS.forEach((s, i)=>{\n    const r = document.createElement(\"div\");\n    r.className = \"trace-row\";\n    r.dataset.idx = i;\n    r.innerHTML = `\n      <span class=\"step\">${String(i+1).padStart(2,'0')}<\u002Fspan>\n      <span class=\"name\">${s.name}<\u002Fspan>\n      ${i===3 ? '<span class=\"fork\">⑂<\u002Fspan>' : ''}\n      <span class=\"ms\">${s.ms}ms<\u002Fspan>`;\n    r.addEventListener(\"click\", ()=> selectStep(i));\n    traceList.appendChild(r);\n  });\n  let cur = 3;\n  function selectStep(i){\n    cur = i;\n    document.querySelectorAll(\".trace-row\").forEach(el=> el.classList.toggle(\"active\", +el.dataset.idx===i));\n    const s = STEPS[i];\n    document.getElementById(\"rdStep\").textContent  = `Step ${i+1} · of ${STEPS.length}`;\n    document.getElementById(\"rdTitle\").textContent = s.name;\n    document.getElementById(\"rdTag\").textContent   = s.tag;\n    document.getElementById(\"rdIn\").textContent    = s.in;\n    document.getElementById(\"rdOut\").textContent   = s.out;\n    // running totals\n    let totTok=0, totCost=0;\n    for(let k=0;k<=i;k++){ totTok += STEPS[k].tok; totCost += STEPS[k].cost; }\n    document.getElementById(\"tokNow\").textContent  = totTok.toLocaleString();\n    document.getElementById(\"costNow\").textContent = \"$\"+totCost.toFixed(4);\n    document.getElementById(\"tokBar\").style.width  = Math.min(100, totTok/1847*100)+\"%\";\n    document.getElementById(\"costBar\").style.width = Math.min(100, totCost/0.0062*100)+\"%\";\n    document.getElementById(\"stepLabel\").textContent = `Step ${i+1} of ${STEPS.length}${i===3 ? \" · ⑂ 1 fork\":\"\"}`;\n  }\n  document.getElementById(\"prevBtn\").addEventListener(\"click\", ()=> selectStep((cur-1+STEPS.length)%STEPS.length));\n  document.getElementById(\"nextBtn\").addEventListener(\"click\", ()=> selectStep((cur+1)%STEPS.length));\n  selectStep(3);\n\n  // ---- Copy pip ----\n  function copyPip(el){\n    const t = (el && el.textContent) ? el.textContent.trim() : \"pip install fastaiagent\";\n    try{ navigator.clipboard.writeText(t); }catch(e){}\n    const old = el.textContent; el.textContent = \"copied ✓\";\n    setTimeout(()=>{ el.textContent = old; }, 1200);\n  }\n  window.copyPip = copyPip;\n  document.getElementById(\"copyCmd\").addEventListener(\"click\", function(){ copyPip(this); });\n\n  // ---- date stamp ----\n  document.getElementById(\"stamp\").textContent = new Date().toLocaleDateString(undefined,{year:\"numeric\",month:\"short\",day:\"numeric\"});\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
